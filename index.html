<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MySpotify</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="logo">🎵 MySpotify</h1>
      <nav>
        <a href="#" class="active">🏠 Home</a>
        <a href="#">🔍 Search</a>
        <a href="#">📚 Library</a>
      </nav>
    </aside>

    <main class="main">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search songs, artists..." />
        <button id="searchBtn">Search</button>
      </div>

      <h2 id="sectionTitle">Trending Now</h2>
      <div class="songs-grid" id="songsGrid">
        <p class="loading">Loading songs...</p>
      </div>
    </main>

    <footer class="player">
      <div class="now-playing">
        <img id="nowImg" src="" alt="" />
        <div>
          <p id="nowTitle">Select a song</p>
          <p id="nowArtist" class="artist"></p>
        </div>
      </div>
      <audio id="audioPlayer" controls></audio>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
